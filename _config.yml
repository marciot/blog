title: MarcioT's Tech Blog
email: mlt4356-github@yahoo.com

tagline: 3D Printing, Graphics, Retrocomputing and JavaScript

url: "https://www.marciot.com" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "/blog" # the subpath of your site, e.g. /blog

author:
  name: Marcio Teixeira
  url: https://www.marciot.com

github_username:  marciot

markdown: kramdown
kramdown:
  input: GFM
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  syntax_highlighter: rouge
  
titles_from_headings:
  enabled:     true
  strip_title: false
  collections: true

# Build settings
#remote_theme: h01000110/windows-95
#remote_theme: sharadcodes/geekyll-starter-blog
#remote_theme: sighingnow/jekyll-gitbook
#remote_theme: abhn/Elementary
#remote_theme: riggraz/no-style-please
#remote_theme: ../Elementary
remote_theme: marciot/blog-theme

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-titles-from-headings
  - jekyll-seo-tag

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: default